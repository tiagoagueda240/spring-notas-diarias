# 1. ADICIONADO: Configuração obrigatória para o Render (Porta dinâmica)
server:
  port: ${PORT:8080}

spring:
  application:
    name: bragdoc-api

  datasource:
    # 2. ALTERADO: Usar variáveis de ambiente para a BD, mantendo o localhost como fallback para o teu PC
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bragdoc_db}
    username: ${DB_USERNAME:agueda}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: "always"
  metrics:
    export:
      prometheus:
        enabled: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.tiagoagueda.api: INFO # Substitui pelo package real do teu projeto, se for diferente

# Configuração de CORS (Cross-Origin Resource Sharing)
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
