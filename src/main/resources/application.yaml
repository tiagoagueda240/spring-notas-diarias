# 1. ADICIONADO: Configuração obrigatória para o Render (Porta dinâmica)
server:
  port: ${PORT:8080}

spring:
  application:
    name: bragdoc-api

  datasource:
    # 2. ALTERADO: Usar variáveis de ambiente para a BD, mantendo o localhost como fallback para o teu PC
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bragdoc_db}
    username: ${DB_USERNAME:agueda}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      # ATENÇÃO: usar 'validate' em produção — 'update' é aceitável apenas em dev local
      ddl-auto: update
    # Desativar em produção (variável de ambiente: SPRING_JPA_SHOW_SQL=false)
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: "always"
  metrics:
    export:
      prometheus:
        enabled: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: 900000 # 15 minutos em ms
      refresh-token-expiration-days: 7 # 7 dias para o refresh token opaco
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}
  rate-limit:
    ai-requests-per-hour: 10
  admin:
    email: ${ADMIN_EMAIL:admin@bragdoc.app}
    password: ${ADMIN_PASSWORD:changeme} # OBRIGATÓRIO definir ADMIN_PASSWORD em produção

logging:
  level:
    # Desativar DEBUG de SQL em produção (variável de ambiente: LOGGING_LEVEL_ORG_HIBERNATE_SQL=INFO)
    org.hibernate.SQL: ${LOGGING_LEVEL_SQL:INFO}
    org.hibernate.orm.jdbc.bind: ${LOGGING_LEVEL_SQL_BIND:WARN}
    com.tiagoagueda.api: INFO

# Configuração de CORS (Cross-Origin Resource Sharing)
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
